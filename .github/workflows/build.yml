name: Build site

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-site
  cancel-in-progress: true

jobs:
  build:
    if: "github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch Printful catalog
        env:
          PRINTFUL_API_TOKEN: ${{ secrets.PRINTFUL_API_TOKEN }}
        run: node scripts/fetch-printful.js

      - name: Build site
        run: npm run build

      - name: Commit built HTML if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A -- index.html products originals about commissions collections workshops rights returns privacy thank-you cart contact portfolio printful-status sitemap.xml 404.html src/_data/printfulCatalog.json
          if git diff --cached --quiet; then
            echo "No changes to built output."
          else
            git commit -m "Build site [skip ci]"
            git push
          fi

      - name: Deploy to Ultahost via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/src/**
            **/reference/**
            **/scripts/**
            **/cms-oauth-worker/**
            **/.claude/**
            **/*.md
            **/package*.json
            **/.eleventy.js
